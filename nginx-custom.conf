map $http_user_agent $is_social_preview_crawler {
    default 0;
    ~*(facebookexternalhit|facebot|meta-externalagent|meta-externalfetcher|WhatsApp|Discordbot|Twitterbot|LinkedInBot|Slackbot|TelegramBot) 1;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /uploads/ {
        alias /usr/share/nginx/html/uploads/;
        autoindex off;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ~ ^/amafilmy/[A-Za-z]+[0-9]+/?$ {
        error_page 418 = @video_preview;

        if ($is_social_preview_crawler) {
            return 418;
        }

        try_files $uri $uri/ /index.html;
    }

    location @video_preview {
        rewrite ^/amafilmy/([^/]+)/?$ /api/public/video-preview/$1 last;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
