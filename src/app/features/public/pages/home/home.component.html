<div class="home-container">

  <app-search-bar></app-search-bar>

  <p class="outage-notice direct-link-notice" *ngIf="directLinkLoading">Ładowanie filmu...</p>

  <app-promoted-videos-section
    (videoSelected)="openVideoFromTile($event, 'promoted')"
    (loadFailed)="onSectionLoadFailed()"
  ></app-promoted-videos-section>

  <p class="outage-notice" *ngIf="showOutageNotice">{{ outageMessage }}</p>

  <div class="separator-line"></div>

  <app-categories
    (categorySelected)="onCategorySelected($event)"
    (loadFailed)="onSectionLoadFailed()"
  ></app-categories>

  <app-videos-grid
    [selectedCategoryId]="selectedCategoryId"
    (videoSelected)="openVideoFromTile($event, 'regular')"
    (loadFailed)="onSectionLoadFailed()"
  ></app-videos-grid>

  <app-video-modal
    *ngIf="selectedVideo"
    [video]="selectedVideo"
    [variant]="modalVariant"
    (closed)="closeModal()"
  ></app-video-modal>

  <div
    class="unavailable-video-modal-overlay"
    *ngIf="showUnavailableVideoModal"
    (click)="closeUnavailableVideoModal()"
  >
    <div class="unavailable-video-modal" (click)="$event.stopPropagation()">
      <p class="unavailable-video-modal-message">{{ unavailableVideoMessage }}</p>
      <button
        type="button"
        class="unavailable-video-modal-button"
        (click)="closeUnavailableVideoModal()"
      >
        Zamknij
      </button>
    </div>
  </div>

</div>
