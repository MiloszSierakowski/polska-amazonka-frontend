<section class="videos-section">
  <div class="videos-grid" *ngIf="videos.length; else noVideos">
    <button class="video-tile" *ngFor="let video of videos" (click)="openModal(video)">
      <img [src]="video.previewImageUrl" [alt]="video.title" (error)="onPreviewImageError($event)" />
    </button>
  </div>

  <ng-template #noVideos>
    <div class="no-videos">Brak filmów dla tej kategorii.</div>
  </ng-template>
</section>

<div class="video-modal-overlay" *ngIf="selectedVideo" (click)="closeModal()">
  <div class="video-modal" (click)="$event.stopPropagation()" [class.mobile-products-open]="showProductsOnMobile">
    <button class="close-button" (click)="closeModal()">✕</button>

    <div class="video-pane" [class.mobile-hidden]="showProductsOnMobile">
      <div class="video-frame-crop">
        <iframe
          [src]="toTikTokEmbedUrl(selectedVideo.tiktokUrl)"
          title="TikTok video"
          allow="encrypted-media"
          allowfullscreen
          scrolling="no"
        ></iframe>
      </div>

      <button class="mobile-products-toggle" type="button" (click)="showProductsPanel()">
        Pokaż produkty 🔗
      </button>
    </div>

    <aside class="products-pane" [class.mobile-visible]="showProductsOnMobile">
      <button class="mobile-video-toggle" type="button" (click)="showVideoPanel()">⬇ Pokaż film</button>
      <h3 class="video-modal-title">{{ selectedVideo.title }}</h3>
      <h4>Produkty z filmu</h4>
      <a
        class="product-item"
        *ngFor="let product of selectedVideo.products"
        [href]="product.productLink.url"
        target="_blank"
        rel="noopener noreferrer"
        (click)="onProductClick($event, product)"
      >
        <img [src]="product.imageUrl" [alt]="product.name" />
        <span>{{ product.name }}</span>
      </a>
    </aside>
  </div>
</div>

<div class="platform-modal-overlay" *ngIf="selectedProductForRedirect" (click)="closePlatformChooser()">
  <div class="platform-modal" (click)="$event.stopPropagation()">
    <h4>Do jakiego sklepu przejść?</h4>
    <p>{{ selectedProductForRedirect.name }}</p>
    <div class="platform-buttons">
      <button class="platform-button aliexpress" type="button" (click)="choosePlatform('aliexpress')">AliExpress</button>
      <button class="platform-button temu" type="button" (click)="choosePlatform('temu')">Temu</button>
    </div>
    <button class="platform-cancel" type="button" (click)="closePlatformChooser()">Anuluj</button>
  </div>
</div>
