<section class="videos-section" *ngIf="!hasLoadError">
  <div class="videos-grid" *ngIf="videos.length; else noVideos">
    <button
      type="button"
      class="video-tile"
      *ngFor="let video of videos"
      (click)="openModal(video)"
      [attr.aria-label]="video.title"
    >
      <img
        class="video-tile-thumb"
        [src]="previewSrc(video)"
        [alt]="video.title"
        loading="lazy"
        (error)="onPreviewError(video)"
      />
    </button>
  </div>

  <ng-template #noVideos>
    <div class="no-videos">Brak filmów dla tej kategorii.</div>
  </ng-template>
</section>

<div class="video-modal-overlay" *ngIf="selectedVideo" (click)="closeModal()">
  <div class="video-modal" (click)="$event.stopPropagation()">
    <button class="close-button" (click)="closeModal()">✕</button>

    <div class="video-pane">
      <div class="video-loader" *ngIf="isLoadingVideo">
        <div class="spinner"></div>
      </div>

      <div class="tiktok-frame" [class.is-loading]="isLoadingVideo">
        <iframe
          *ngIf="safeVideoUrl"
          [src]="safeVideoUrl"
          (load)="isLoadingVideo = false"
          title="TikTok video"
          allow="encrypted-media"
          allowfullscreen
        ></iframe>
      </div>
    </div>

    <aside class="products-pane">
      <div class="products-grid" *ngIf="selectedVideo.products.length; else noProducts">
        <a
          class="product-card"
          *ngFor="let product of selectedVideo.products"
          [href]="product.productLink.url"
          target="_blank"
          rel="noopener noreferrer"
        >
          <div class="product-image-wrapper">
            <img [src]="product.imageUrl" [alt]="product.name" width="400" height="400" />
          </div>
          <div class="product-info">
            <span class="product-name">{{ product.name }}</span>
          </div>
        </a>
      </div>

      <ng-template #noProducts>
        <div class="no-products">Brak produktów przypisanych do filmu.</div>
      </ng-template>
    </aside>
  </div>
</div>
