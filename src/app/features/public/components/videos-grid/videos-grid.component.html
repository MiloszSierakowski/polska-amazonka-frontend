<section class="videos-section" *ngIf="!hasLoadError">
  <p class="videos-loading" *ngIf="isLoadingVideos">Ładowanie filmów...</p>

  <div class="videos-grid" *ngIf="!isLoadingVideos && videos.length; else noVideos">
    <button
      type="button"
      class="video-tile"
      *ngFor="let video of videos"
      (click)="selectVideo(video)"
      [attr.aria-label]="video.title"
    >
      <img
        class="video-tile-thumb"
        [src]="previewSrc(video)"
        [alt]="video.title"
        loading="lazy"
        (error)="onPreviewError(video)"
      />
    </button>
  </div>

  <ng-template #noVideos>
    <div class="no-videos" *ngIf="!isLoadingVideos">{{ emptyStateMessage }}</div>
  </ng-template>
</section>
