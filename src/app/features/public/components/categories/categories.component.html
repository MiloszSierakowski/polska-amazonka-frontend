<div class="categories-scroll" (wheel)="onWheel($event)">
  <div class="categories-inner">
    <button
      type="button"
      class="category-box"
      *ngFor="let c of categories"
      [class.active]="c.id === selectedCategoryId"
      (click)="selectCategory(c.id)"
    >
      <span class="category-icon-wrapper">
        <img [src]="c.imageUrl" [alt]="c.name" class="category-icon" width="220" height="72" />
      </span>
    </button>
  </div>
</div>
