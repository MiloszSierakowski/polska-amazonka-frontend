<div class="login-page">
  <section class="login-shell">
    <header class="login-header">
      <span class="login-badge">Panel</span>
      <h1>Polska Amazonka</h1>
      <p>Zaloguj się jako administrator</p>
    </header>

    <form class="login-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label class="field">
        <span>Login</span>
        <input type="text" formControlName="login" autocomplete="username" />
      </label>

      <label class="field">
        <span>Hasło</span>
        <input type="password" formControlName="password" autocomplete="current-password" />
      </label>

      <button type="submit" class="submit-btn" [disabled]="isSubmitting">
        {{ isSubmitting ? 'Logowanie…' : 'Zaloguj się' }}
      </button>
    </form>
  </section>
</div>
