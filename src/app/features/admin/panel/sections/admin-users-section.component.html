<div class="section-body">
  <ul class="item-list">
    <li class="item-row" *ngFor="let item of items">
      <div class="item-main">
        <span class="item-title">{{ item.login }}</span>
        <span class="item-badge" [class.is-admin]="item.role === 'ADMIN'">
          {{ roleLabel(item.role) }}
        </span>
      </div>
      <button type="button" class="item-action" (click)="startEdit(item)">Edytuj</button>
    </li>
  </ul>
  <form class="item-form" [formGroup]="form" (ngSubmit)="save()">
    <h3>{{ editingId ? 'Edycja użytkownika' : 'Nowy pracownik' }}</h3>
    <label>
      <span>Login</span>
      <input type="text" formControlName="login" />
    </label>
    <label>
      <span>Rola</span>
      <select formControlName="role">
        <option value="WORKER">WORKER</option>
        <option value="ADMIN">ADMIN</option>
      </select>
    </label>
    <div class="form-actions">
      <button type="button" class="btn-secondary" (click)="startAdd()">Wyczyść</button>
      <button type="submit" class="btn-primary">Zapisz</button>
    </div>
  </form>
</div>
