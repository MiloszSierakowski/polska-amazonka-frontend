<div class="users-admin">
  <div class="users-admin-toolbar">
    <button type="button" class="primary-action users-add-toggle" (click)="openAddUserModal()">
      Dodaj użytkownika
    </button>
  </div>

  <p class="users-status" *ngIf="isLoading">Ładowanie użytkowników...</p>
  <p class="users-status users-status-error" *ngIf="!isLoading && hasLoadError">
    Nie udało się pobrać listy użytkowników.
  </p>
  <p class="users-status" *ngIf="!isLoading && !hasLoadError && !items.length">
    Brak użytkowników w systemie.
  </p>

  <div class="section-body" *ngIf="!isLoading && !hasLoadError">
    <ul class="item-list" *ngIf="items.length">
      <li class="item-row" *ngFor="let item of items" [class.is-blocked]="item.isBlocked">
        <div class="item-main">
          <span class="item-title">{{ item.login }}</span>
          <span class="item-meta" *ngIf="item.email">{{ item.email }}</span>
          <span class="item-meta" *ngIf="!item.email">Brak adresu e-mail</span>
          <div class="item-badges">
            <span class="item-badge" [class.is-admin]="item.role === 'ADMIN'">
              {{ roleLabel(item.role) }}
            </span>
            <span class="item-badge" [class.inactive]="item.isBlocked">
              {{ item.isBlocked ? 'Zablokowany' : 'Aktywny' }}
            </span>
          </div>
        </div>
        <div class="item-actions">
          <button
            type="button"
            class="item-action"
            [disabled]="isActionPending(item.id)"
            (click)="toggleBlocked(item)"
          >
            {{ item.isBlocked ? 'Odblokuj' : 'Zablokuj' }}
          </button>
          <button
            type="button"
            class="item-action danger"
            [disabled]="isActionPending(item.id)"
            (click)="deleteUser(item)"
          >
            Usuń
          </button>
        </div>
      </li>
    </ul>
  </div>
</div>

<div class="user-modal-overlay" *ngIf="isUserModalOpen" (click)="closeUserModal()">
  <div class="user-modal" (click)="$event.stopPropagation()">
    <div class="user-modal-header">
      <h3>Dodaj użytkownika</h3>
      <button type="button" class="user-modal-close" (click)="closeUserModal()" aria-label="Zamknij">×</button>
    </div>

    <form class="item-form user-modal-form" [formGroup]="userAddForm" (ngSubmit)="saveNewUser()">
      <p class="form-alert-error" *ngIf="saveError" role="alert">{{ saveError }}</p>

      <label class="field-shell">
        <span>Login</span>
        <div class="field-control">
          <input
            type="text"
            formControlName="login"
            autocomplete="username"
            [class.is-invalid]="showFieldError('login')"
          />
          <p class="field-error-text" *ngIf="showFieldError('login')" role="alert">
            {{ fieldErrorMessage('login') }}
          </p>
        </div>
      </label>

      <label class="field-shell">
        <span>E-mail (opcjonalnie)</span>
        <div class="field-control">
          <input
            type="email"
            formControlName="email"
            autocomplete="email"
            [class.is-invalid]="showFieldError('email')"
          />
          <p class="field-error-text" *ngIf="showFieldError('email')" role="alert">
            {{ fieldErrorMessage('email') }}
          </p>
        </div>
      </label>

      <label class="field-shell">
        <span>Hasło</span>
        <div class="field-control">
          <input
            type="password"
            formControlName="password"
            autocomplete="new-password"
            [class.is-invalid]="showFieldError('password')"
          />
          <p class="field-error-text" *ngIf="showFieldError('password')" role="alert">
            {{ fieldErrorMessage('password') }}
          </p>
        </div>
      </label>

      <label class="field-shell">
        <span>Rola</span>
        <select formControlName="role">
          <option value="WORKER">Pracownik</option>
          <option value="ADMIN">Administrator</option>
        </select>
      </label>

      <div class="user-modal-footer">
        <button type="button" class="secondary-action" (click)="closeUserModal()">Anuluj</button>
        <button type="submit" class="primary-action" [disabled]="isSaving">
          {{ isSaving ? 'Zapisywanie...' : 'Zapisz' }}
        </button>
      </div>
    </form>
  </div>
</div>
