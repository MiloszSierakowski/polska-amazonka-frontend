<div class="admin-panel-page">
  <header class="admin-panel-header">
    <div>
      <p class="eyebrow">Panel zarządzania</p>
      <h1>Polska Amazonka</h1>
      <p class="subtitle" *ngIf="sessionLabel">Zalogowano: {{ sessionLabel }}</p>
    </div>
    <div class="header-actions">
      <button type="button" class="logout-btn" (click)="openProfileModal()">Użytkownik</button>
      <button type="button" class="logout-btn" (click)="logout()">Wyloguj</button>
    </div>
  </header>

  <div class="accordion">
    <article
      class="accordion-card"
      *ngFor="let section of visibleSections()"
      [class.is-open]="isOpen(section.id)"
    >
      <button
        type="button"
        class="accordion-header"
        (click)="toggleSection(section.id)"
        [attr.aria-expanded]="isOpen(section.id)"
      >
        <span class="accordion-title">{{ section.title }}</span>
        <span class="accordion-chevron" [class.is-open]="isOpen(section.id)"></span>
      </button>

      <div class="accordion-panel" *ngIf="isOpen(section.id)">
        <app-admin-videos-section *ngIf="section.id === 'videos'"></app-admin-videos-section>
        <app-admin-videos-section
          *ngIf="section.id === 'promoted-videos'"
          viewMode="promoted"
        ></app-admin-videos-section>
        <app-admin-categories-section *ngIf="section.id === 'categories'"></app-admin-categories-section>
        <app-admin-shops-section *ngIf="section.id === 'shops'"></app-admin-shops-section>
        <app-admin-analytics-section *ngIf="section.id === 'analytics'"></app-admin-analytics-section>
        <app-admin-broken-links-section
          *ngIf="section.id === 'broken-links'"
          [active]="isOpen('broken-links')"
        ></app-admin-broken-links-section>
        <app-admin-link-validation-section
          *ngIf="section.id === 'link-validation'"
          [active]="isOpen('link-validation')"
        ></app-admin-link-validation-section>
        <app-admin-navigation-links-section *ngIf="section.id === 'navigation-links'"></app-admin-navigation-links-section>
        <app-admin-users-section *ngIf="section.id === 'users'"></app-admin-users-section>
        <app-admin-changelog-section *ngIf="section.id === 'changelog'"></app-admin-changelog-section>
      </div>
    </article>
  </div>
</div>

<app-admin-user-profile-modal
  *ngIf="profileModalOpen"
  (closed)="closeProfileModal()"
  (saved)="onProfileSaved($event)"
></app-admin-user-profile-modal>
